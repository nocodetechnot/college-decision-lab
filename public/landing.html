<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Gidana AI | Launching Soon</title>
  <meta name="description" content="Agentic AI Infrastructure for Commerce." />
  <style>
    :root {
      --bg: #F8FAFC;
      --bg-top: #FFFFFF;
      --text: #0F172A;
      --muted: #475569;
      --muted-2: #64748B;
      --border: #E2E8F0;
      --accent: #2563EB;
      --accent-soft: #E2E8F0;
      --accent-soft-hover: #CBD5E1;
      --content: 1160px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(37, 99, 235, 0.05), transparent 24%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg) 100%);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.03;
      background-image:
        linear-gradient(rgba(15, 23, 42, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 23, 42, 0.07) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    .page {
      position: relative;
      width: min(100%, var(--content));
      margin: 0 auto;
      padding:
        max(20px, env(safe-area-inset-top))
        clamp(18px, 3vw, 28px)
        calc(92px + env(safe-area-inset-bottom));
      z-index: 1;
    }

    .hero {
      min-height: calc(100svh - 24px);
      display: grid;
      align-items: center;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      gap: clamp(32px, 5vw, 72px);
      align-items: center;
      width: 100%;
      min-width: 0;
    }

    .copy {
      min-width: 0;
      max-width: 620px;
    }

    .launching {
      display: inline-block;
      margin-bottom: 18px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted-2);
    }

    h1 {
      margin: 0;
      font-size: clamp(38px, 6vw, 70px);
      line-height: 0.96;
      letter-spacing: -0.05em;
      max-width: 11ch;
    }

    .lede {
      margin: 24px 0 0;
      max-width: 42ch;
      font-size: clamp(17px, 2.1vw, 20px);
      line-height: 1.75;
      color: var(--muted);
    }

    .term {
      position: relative;
      display: inline-block;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      background-image: linear-gradient(rgba(37, 99, 235, 0.24), rgba(37, 99, 235, 0.24));
      background-repeat: no-repeat;
      background-size: 100% 0.36em;
      background-position: 0 92%;
      padding-bottom: 0.02em;
    }

    .updates {
      margin-top: clamp(56px, 10vh, 112px);
      max-width: 420px;
    }

    .updates-title {
      margin: 0 0 14px;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .updates-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .updates-note {
      margin: 0;
      font-size: 14px;
      line-height: 1.6;
      color: var(--muted);
    }

    .tally-trigger {
      width: 54px;
      height: 54px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--accent-soft);
      color: var(--text);
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03);
    }

    .tally-trigger:hover {
      background: var(--accent-soft-hover);
      border-color: #CBD5E1;
      transform: translateY(-1px);
    }

    .tally-trigger:active {
      transform: translateY(0);
    }

    .tally-trigger svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .visual {
      min-width: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo-wrap {
      width: min(100%, 460px);
    }

    .logo {
      display: block;
      width: 100%;
      height: auto;
      overflow: visible;
    }

    .logo .network-lines path {
      stroke-dasharray: 880;
      stroke-dashoffset: 880;
      animation: drawPath 1.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .logo .node {
      opacity: 0;
      transform: scale(0.84);
      transform-box: fill-box;
      transform-origin: center;
      animation: nodeIn 0.34s ease forwards;
    }

    .logo .node.outer:nth-of-type(1) { animation-delay: 0.95s; }
    .logo .node.outer:nth-of-type(2) { animation-delay: 1.02s; }
    .logo .node.outer:nth-of-type(3) { animation-delay: 1.08s; }
    .logo .node.outer:nth-of-type(4) { animation-delay: 1.14s; }
    .logo .node.outer:nth-of-type(5) { animation-delay: 1.20s; }
    .logo .node.outer:nth-of-type(6) { animation-delay: 1.26s; }
    .logo .node.inner:nth-of-type(7) { animation-delay: 1.32s; }
    .logo .node.inner:nth-of-type(8) { animation-delay: 1.38s; }
    .logo .node.inner:nth-of-type(9) { animation-delay: 1.44s; }
    .logo .node.inner:nth-of-type(10) { animation-delay: 1.50s; }
    .logo .node.inner:nth-of-type(11) { animation-delay: 1.56s; }
    .logo .node.inner:nth-of-type(12) { animation-delay: 1.62s; }
    .logo .node.inner:nth-of-type(13) { animation-delay: 1.68s; }
    .logo .node.inner:nth-of-type(14) { animation-delay: 1.74s; }
    .logo .node.inner:nth-of-type(15) { animation-delay: 1.80s; }

    .logo .node.active {
      filter: drop-shadow(0 0 3px rgba(6, 182, 212, 0.4));
      animation:
        nodeIn 0.34s ease forwards,
        nodePulse 5.2s ease-in-out infinite;
    }

    .logo .node.active.a1 { animation-delay: 0.95s, 2.2s; }
    .logo .node.active.a2 { animation-delay: 1.02s, 2.8s; }
    .logo .node.active.a3 { animation-delay: 1.08s, 3.3s; }
    .logo .node.active.a4 { animation-delay: 1.14s, 3.9s; }
    .logo .node.active.a5 { animation-delay: 1.20s, 4.4s; }
    .logo .node.active.a6 { animation-delay: 1.26s, 5.0s; }
    .logo .node.active.a7 { animation-delay: 1.32s, 5.6s; }
    .logo .node.active.a8 { animation-delay: 1.38s, 6.1s; }
    .logo .node.active.a9 { animation-delay: 1.44s, 6.7s; }
    .logo .node.active.a10 { animation-delay: 1.50s, 7.2s; }

    .logo .flow {
      stroke: #22C55E;
      stroke-width: 6;
      stroke-dasharray: 22 160;
      stroke-dashoffset: 120;
      opacity: 0;
      filter: drop-shadow(0 0 4px rgba(37, 99, 235, 0.25));
      animation: flowMove 4.2s linear infinite;
    }

    .logo .flow.f1 { animation-delay: 1.6s; }
    .logo .flow.f2 { animation-delay: 2.2s; }
    .logo .flow.f3 { animation-delay: 2.8s; }
    .logo .flow.f4 { animation-delay: 3.4s; }
    .logo .flow.f5 { animation-delay: 4.0s; }
    .logo .flow.f6 { animation-delay: 4.6s; }
    .logo .flow.f7 { animation-delay: 5.2s; }
    .logo .flow.f8 { animation-delay: 5.8s; }

    .footer-fixed {
      position: fixed;
      left: 0;
      right: 0;
      bottom: calc(14px + env(safe-area-inset-bottom));
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 2;
    }

    .footer-fixed span {
      padding: 0 12px;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted-2);
    }

    @keyframes drawPath {
      to { stroke-dashoffset: 0; }
    }

    @keyframes nodeIn {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes flowMove {
      0% {
        opacity: 0;
        stroke-dashoffset: 120;
      }
      10% {
        opacity: 0.35;
      }
      55% {
        opacity: 0.45;
      }
      100% {
        opacity: 0;
        stroke-dashoffset: -220;
      }
    }

    @keyframes nodePulse {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.7;
        transform: scale(1.12);
      }
    }

    @media (max-width: 920px) {
      .hero {
        min-height: auto;
        padding-top: 12px;
      }

      .hero-grid {
        grid-template-columns: 1fr;
        gap: 26px;
      }

      .copy {
        max-width: 100%;
        order: 2;
        text-align: left;
      }

      .visual {
        order: 1;
      }

      .logo-wrap {
        width: min(100%, 360px);
      }

      h1 {
        max-width: 12ch;
      }

      .updates {
        margin-top: 42px;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding-left: 16px;
        padding-right: 16px;
      }

      .updates-actions {
        align-items: center;
      }

      .footer-fixed span {
        font-size: 10px;
        letter-spacing: 0.10em;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo .network-lines path,
      .logo .node,
      .logo .flow,
      .tally-trigger {
        animation: none !important;
        transition: none !important;
      }

      .logo .network-lines path {
        stroke-dashoffset: 0;
      }

      .logo .node {
        opacity: 1;
        transform: scale(1);
      }

      .logo .flow {
        display: none;
      }
    }
  </style>

</head>
<body>

      <div class="hero-grid">
        <div class="copy">

          </div>

  </main>

  <div class="footer-fixed">

  </div>
</body>
</html>
