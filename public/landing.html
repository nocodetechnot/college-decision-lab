<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gidana Technologies | Launching Soon</title>
  <meta name="description" content="Gidana Technologies is launching soon." />
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #f7f7f5;
      --gold-1: #f1d06b;
      --gold-2: #d6aa4a;
      --gold-3: #9b6420;
      --text: #111827;
      --muted: rgba(17, 24, 39, 0.72);
      --muted-2: rgba(17, 24, 39, 0.42);
      --terminal-bg: #ffffff;
      --terminal-text: #d6aa4a;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(214,170,74,0.12), transparent 20%),
        radial-gradient(circle at 85% 18%, rgba(214,170,74,0.06), transparent 14%),
        linear-gradient(180deg, #ffffff 0%, var(--bg-soft) 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.035;
      background-image:
        linear-gradient(rgba(17,24,39,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(17,24,39,0.08) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .shell {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 24px 96px;
    }

    .stage {
      width: 100%;
      max-width: 860px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .logo-wrap {
      width: min(100%, 420px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo {
      width: 100%;
      height: auto;
      display: block;
      filter: none;/*drop-shadow(0 10px 34px rgba(155,100,32,0.16)); */
    }

    .eyebrow {
      margin-top: 20px;
      color: rgba(155,100,32,0.86);
      font-size: 13px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
    }

    .terminal {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 14px;
      background: var(--terminal-bg);
      color: var(--terminal-text);
      font-family: SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 14px;
      line-height: 1.4;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
      border: 1px solid rgba(214,170,74,0.18);
    }

    .prompt {
      color: rgba(214,170,74,0.75);
      user-select: none;
    }

    .type-line {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
    }

    .typed-text {
      white-space: nowrap;
      overflow: hidden;
      width: 0;
      animation: typing 3.2s steps(16, end) infinite alternate;
    }

    .cursor {
      display: inline-block;
      width: 9px;
      margin-left: 2px;
      color: var(--terminal-text);
      animation: blink 1s steps(1, end) infinite;
    }

    p {
      margin: 18px auto 0;
      max-width: 520px;
      font-size: clamp(15px, 2vw, 18px);
      line-height: 1.8;
      color: var(--muted);
    }

    .footer-fixed {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 18px;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 2;
    }

    .footer-fixed span {
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted-2);
      padding: 0 12px;
    }

    @keyframes typing {
      0% { width: 0; }
      55% { width: 16ch; }
      100% { width: 16ch; }
    }

    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    @media (max-width: 640px) {
      .shell { padding: 16px 16px 84px; }
      .logo-wrap { width: min(100%, 300px); }
      .eyebrow { letter-spacing: 0.22em; }
      .terminal {
        width: 100%;
        justify-content: center;
        font-size: 13px;
      }
      .footer-fixed { bottom: 12px; }
      .footer-fixed span { font-size: 11px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="stage" aria-label="Gidana Technologies Launching Soon">
      <div class="logo-wrap">
        <svg viewBox="0 0 360 400" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Gidana logo mark">
          <defs>
            <linearGradient id="gidanaGold" x1="18" y1="24" x2="328" y2="360" gradientUnits="userSpaceOnUse">
              <stop stop-color="#F1D06B" />
              <stop offset="0.55" stop-color="#D6AA4A" />
              <stop offset="1" stop-color="#9B6420" />
            </linearGradient>
          </defs>

          <g stroke="url(#gidanaGold)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 113 L95 71 L180 22 L275 71 L340 113" />
            <path d="M340 113 L340 287 L246 342 L180 378 L20 287 L20 113" />
            <path d="M95 71 L95 245" />
            <path d="M95 154 L180 106 L275 71" />
            <path d="M95 245 L180 294 L246 256" />
            <path d="M246 154 L246 342" />
            <path d="M246 154 L340 205" />
            <path d="M180 200 L246 154" />
          </g>

          <g fill="url(#gidanaGold)">
            <circle cx="20" cy="113" r="14" />
            <circle cx="95" cy="71" r="14" />
            <circle cx="180" cy="22" r="14" />
            <circle cx="275" cy="71" r="14" />
            <circle cx="340" cy="113" r="14" />
            <circle cx="95" cy="154" r="14" />
            <circle cx="180" cy="106" r="14" />
            <circle cx="180" cy="200" r="14" />
            <circle cx="246" cy="154" r="14" />
            <circle cx="95" cy="245" r="14" />
            <circle cx="180" cy="294" r="14" />
            <circle cx="246" cy="256" r="14" />
            <circle cx="20" cy="287" r="14" />
            <circle cx="180" cy="378" r="14" />
            <circle cx="340" cy="287" r="14" />
          </g>
        </svg>
      </div>

      <div class="eyebrow">Launching Soon</div>
      <!--
      <div class="terminal" aria-label="building quietly animation">
        <span class="prompt">&gt;</span>
        <span class="type-line">
          <span class="typed-text">building quietly</span><span class="cursor">_</span>
        </span>
      </div>
      -->
    </section>
  </main>

  <div class="footer-fixed">
    <span>© Gidana Technologies 2026</span>
  </div>
</body>
</html>
